# gitleaks configuration — secret-scanning rules for this repo.
#
# Activated by `.githooks/pre-commit` which runs `gitleaks protect`
# on staged changes before every commit. To enable the hooks for a
# fresh clone:
#
#     git config core.hooksPath .githooks
#
# Per-clone setting (lives in .git/config). Each developer opts in
# once. The hook fails closed: if gitleaks isn't installed the
# commit is blocked with a "brew install gitleaks" hint.
#
# Repo-wide history scan: `gitleaks detect`.

[extend]
useDefault = true

# Allowlist for known historical leaks. All triaged 2026-04-28 as
# either false positives (gitleaks regex flagging public/UI strings),
# test fixtures, or planning-doc examples — none are real production
# secrets, so no rotation needed.
[allowlist]
description = "Known historical leaks (false positives, test fixtures, doc examples)"
commits = [
    # backend/app/services/dex_wallet_service.py:47 — public Ethereum
    # contract address inside DEPRECATED_TOKENS dict. Public blockchain
    # data, not a secret. False positive.
    'ae8687b445ca622235c07c3c25c143fed631df4d',
    # backend/tests/routers/test_ai_credentials_router.py:127 —
    # test fixture for the AI-credentials endpoint happy path.
    '248ad458d880029d670cd017d3d0f4e8749d9cd4',
    # frontend/src/components/AddAccountModal.tsx:258 — placeholder
    # text inside a React <input>. False positive.
    'c250370bb94274677853f7e68d52e94f7e95710a',
    # PRPs/high-risk-doubling-preset.md:431 — example value in a
    # planning document. File subsequently deleted.
    '5446a37ba26148e4a84ca2c62ca93570ae1322a5',
    # backend/tests/coinbase_api/test_auth.py:34 — test fixture for
    # load_cdp_credentials_from_file() happy path.
    '18c9bcd3a42b133cff139cfd7fa6c11ab5c0b19d',
]
# Future-proof: tests and planning docs frequently contain example
# values that match secret-shaped patterns. Trust those paths.
paths = [
    '^backend/tests/',
    '^PRPs/',
]
