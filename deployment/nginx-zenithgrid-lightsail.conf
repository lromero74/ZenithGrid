# ZenithGrid nginx reverse proxy — AWS Lightsail production host (since 2026-06-13).
# Install to: /etc/nginx/sites-available/zenithgrid  (symlink into sites-enabled/, remove default)
#
# Terminates TLS on :443 with a SELF-SIGNED origin cert; Cloudflare proxies to this
# origin with SSL/TLS mode = Full (encrypts edge->origin, does not validate the cert).
# All requests (API + frontend dist/ + /ws websocket) proxy to the FastAPI backend
# on 127.0.0.1:8100, which also serves the built frontend from frontend/dist/.
#
# Origin cert/key: /etc/ssl/zenithgrid/origin.crt , /etc/ssl/zenithgrid/origin.key
#   (self-signed, SAN covers all five hostnames; 10-year validity)

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80 default_server;
    server_name tradebot.romerotechsolutions.com bigtruckincrypto.com www.bigtruckincrypto.com bigtruckincryptobot.com www.bigtruckincryptobot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name tradebot.romerotechsolutions.com bigtruckincrypto.com www.bigtruckincrypto.com bigtruckincryptobot.com www.bigtruckincryptobot.com;

    ssl_certificate     /etc/ssl/zenithgrid/origin.crt;
    ssl_certificate_key /etc/ssl/zenithgrid/origin.key;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }
}
