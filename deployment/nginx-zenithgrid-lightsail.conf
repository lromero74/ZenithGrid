# ZenithGrid nginx reverse proxy — AWS Lightsail production host (since 2026-06-13).
# Install to: /etc/nginx/sites-available/zenithgrid  (symlink into sites-enabled/, remove default)
#
# Terminates TLS on :443 with a SELF-SIGNED origin cert; Cloudflare proxies to this
# origin with SSL/TLS mode = Full (encrypts edge->origin, does not validate the cert).
# nginx serves the built frontend from /var/www/zenithgrid/current directly so a busy API
# process cannot delay index.html and leave mobile browsers on a white screen.
# API, backend static files, and /ws websocket traffic proxy to FastAPI on
# 127.0.0.1:8100.
#
# Origin cert/key: /etc/ssl/zenithgrid/origin.crt , /etc/ssl/zenithgrid/origin.key
#   (self-signed, SAN covers all five hostnames; 10-year validity)

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80 default_server;
    server_name tradebot.romerotechsolutions.com bigtruckincrypto.com www.bigtruckincrypto.com bigtruckincryptobot.com www.bigtruckincryptobot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name tradebot.romerotechsolutions.com bigtruckincrypto.com www.bigtruckincrypto.com bigtruckincryptobot.com www.bigtruckincryptobot.com;

    ssl_certificate     /etc/ssl/zenithgrid/origin.crt;
    ssl_certificate_key /etc/ssl/zenithgrid/origin.key;

    client_max_body_size 25m;

    root /var/www/zenithgrid/current;
    index index.html;

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location ^~ /ws {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location ^~ /static/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
